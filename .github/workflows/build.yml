name: Build SKSE for Modlists

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    strategy:
      matrix:
        include:
          - name: "SE"
            skse_major: 2
            skse_minor: 0
            skse_patch: 20
            runtime_major: 1
            runtime_minor: 5
            runtime_patch: 97
            artifact_name: "skse-for-modlists-SE-1.5.97"
          - name: "AE"
            skse_major: 2
            skse_minor: 2
            skse_patch: 6
            runtime_major: 1
            runtime_minor: 6
            runtime_patch: 1170
            artifact_name: "skse-for-modlists-AE-1.6.1170"

    name: Build for Skyrim ${{ matrix.name }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        path: skse64
        submodules: recursive

    - name: Checkout common library
      uses: actions/checkout@v4
      with:
        repository: ianpatt/common
        path: common

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.3

    - name: Setup CMake
      uses: jwlawson/actions-setup-cmake@v1.14
      with:
        cmake-version: '3.27.x'

    - name: Set Version for ${{ matrix.name }}
      run: |
        Write-Host "=== BEFORE modification ==="
        Get-Content skse64/skse64_common/skse_version.h | Select-String -Pattern "SKSE_VERSION_INTEGER"

        # Read the header file (THIS is where the actual version is defined!)
        $content = Get-Content skse64/skse64_common/skse_version.h -Raw

        # Set SKSE version (controls which game addresses are used)
        # Lines look like: #define SKSE_VERSION_INTEGER		2
        $content = $content -replace '#define SKSE_VERSION_INTEGER\s+\d+', "#define SKSE_VERSION_INTEGER`t`t${{ matrix.skse_major }}"
        $content = $content -replace '#define SKSE_VERSION_INTEGER_MINOR\s+\d+', "#define SKSE_VERSION_INTEGER_MINOR`t${{ matrix.skse_minor }}"
        $content = $content -replace '#define SKSE_VERSION_INTEGER_BETA\s+\d+', "#define SKSE_VERSION_INTEGER_BETA`t${{ matrix.skse_patch }}"

        # Update VERSTRING to match: "0, major, minor, patch"
        $verString = "0, ${{ matrix.skse_major }}, ${{ matrix.skse_minor }}, ${{ matrix.skse_patch }}"
        $content = $content -replace '#define SKSE_VERSION_VERSTRING\s+"[^"]+"', "#define SKSE_VERSION_VERSTRING`t`t`"$verString`""

        # Update CURRENT_RELEASE_SKSE_STR
        $releaseStr = "${{ matrix.skse_major }}.${{ matrix.skse_minor }}.${{ matrix.skse_patch }}"
        $content = $content -replace '#define CURRENT_RELEASE_SKSE_STR\s+"[^"]+"', "#define CURRENT_RELEASE_SKSE_STR`t`"$releaseStr`""

        $content | Set-Content skse64/skse64_common/skse_version.h -NoNewline

        # Also update cmake/versioning.cmake for runtime version
        $cmakeContent = Get-Content skse64/cmake/versioning.cmake -Raw
        $cmakeContent = $cmakeContent -replace 'set\(RUNTIME_VERSION_MAJOR \d+\)', "set(RUNTIME_VERSION_MAJOR ${{ matrix.runtime_major }})"
        $cmakeContent = $cmakeContent -replace 'set\(RUNTIME_VERSION_MINOR \d+\)', "set(RUNTIME_VERSION_MINOR ${{ matrix.runtime_minor }})"
        $cmakeContent = $cmakeContent -replace 'set\(RUNTIME_VERSION_PATCH \d+\)', "set(RUNTIME_VERSION_PATCH ${{ matrix.runtime_patch }})"
        $cmakeContent | Set-Content skse64/cmake/versioning.cmake -NoNewline

        Write-Host "=== AFTER modification for ${{ matrix.name }} ==="
        Get-Content skse64/skse64_common/skse_version.h | Select-String -Pattern "SKSE_VERSION_INTEGER"

        # Verify the changes in header file
        $check = Get-Content skse64/skse64_common/skse_version.h -Raw
        if ($check -notmatch "#define SKSE_VERSION_INTEGER\s+${{ matrix.skse_major }}") {
          Write-Error "FAILED to set SKSE_VERSION_INTEGER!"
          exit 1
        }
        if ($check -notmatch "#define SKSE_VERSION_INTEGER_MINOR\s+${{ matrix.skse_minor }}") {
          Write-Error "FAILED to set SKSE_VERSION_INTEGER_MINOR!"
          exit 1
        }
        if ($check -notmatch "#define SKSE_VERSION_INTEGER_BETA\s+${{ matrix.skse_patch }}") {
          Write-Error "FAILED to set SKSE_VERSION_INTEGER_BETA!"
          exit 1
        }
        Write-Host "Version verification PASSED - SKSE ${{ matrix.skse_major }}.${{ matrix.skse_minor }}.${{ matrix.skse_patch }} for Skyrim ${{ matrix.name }}"
      shell: pwsh

    - name: Build and install common library
      run: cmake -B common/build -S common -DCMAKE_INSTALL_PREFIX=extern common

    - name: Install common library
      run: cmake --build common/build --config Release --target install

    - name: Configure CMake
      run: cmake -B skse64/build -S skse64 -DCMAKE_INSTALL_PREFIX=extern skse64

    - name: Build Release
      run: cmake --build skse64/build --config Release

    - name: Download Official SKSE for Papyrus Scripts
      run: |
        # Download official SKSE to get the compiled .pex files
        # SE version: skse64_2_00_20.7z
        # AE version: skse64_2_02_06.7z (for 1.6.1170)
        if ("${{ matrix.name }}" -eq "SE") {
          $skseUrl = "https://skse.silverlock.org/beta/skse64_2_00_20.7z"
          $skseArchive = "skse64_2_00_20.7z"
          $skseFolder = "skse64_2_00_20"
        } else {
          $skseUrl = "https://skse.silverlock.org/beta/skse64_2_02_06.7z"
          $skseArchive = "skse64_2_02_06.7z"
          $skseFolder = "skse64_2_02_06"
        }

        Write-Host "Downloading official SKSE from: $skseUrl"
        Invoke-WebRequest -Uri $skseUrl -OutFile $skseArchive

        # Extract using 7z
        7z x $skseArchive -oofficial_skse

        Write-Host "Official SKSE extracted to official_skse/$skseFolder"
        Get-ChildItem -Path "official_skse/$skseFolder/Data/Scripts" -Filter "*.pex" | Measure-Object | Select-Object -ExpandProperty Count | ForEach-Object { Write-Host "Found $_ .pex files" }
      shell: pwsh

    - name: Package Release
      run: |
        New-Item -ItemType Directory -Force -Path release_package
        New-Item -ItemType Directory -Force -Path release_package/Data/Scripts
        New-Item -ItemType Directory -Force -Path release_package/Data/Scripts/Source

        # Copy executables to ROOT (not Data folder!)
        Copy-Item skse64/build/skse64_loader/Release/skse64_loader.exe release_package/
        Copy-Item skse64/build/skse64_steam_loader/Release/skse64_steam_loader.dll release_package/

        # Copy runtime DLL - filename varies by version
        # For AE 1.6.x: skse64_1_6_1170.dll
        # For SE 1.5.97: skse64_1_5_97.dll
        $runtimeDll = Get-ChildItem -Path skse64/build/skse64/Release/skse64_*.dll | Select-Object -First 1
        Copy-Item $runtimeDll.FullName release_package/
        Write-Host "Packaged runtime DLL: $($runtimeDll.Name)"

        # Copy compiled Papyrus scripts (.pex) from official SKSE
        if ("${{ matrix.name }}" -eq "SE") {
          $skseFolder = "skse64_2_00_20"
        } else {
          $skseFolder = "skse64_2_02_06"
        }
        Copy-Item "official_skse/$skseFolder/Data/Scripts/*.pex" release_package/Data/Scripts/
        $pexCount = (Get-ChildItem release_package/Data/Scripts/*.pex | Measure-Object).Count
        Write-Host "Copied $pexCount .pex files to release package"

        # Copy Papyrus script sources
        Copy-Item -Recurse skse64/scripts/modified/* release_package/Data/Scripts/Source/

        # Copy documentation (match vanilla SKSE package)
        Copy-Item skse64/skse64_license.txt release_package/
        Copy-Item skse64/skse64_readme.txt release_package/
        Copy-Item skse64/skse64_whatsnew.txt release_package/
      shell: pwsh

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: release_package/
        retention-days: 90

    - name: Create Release Archive
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        cd release_package
        Compress-Archive -Path * -DestinationPath ../${{ matrix.artifact_name }}-${{ github.ref_name }}.zip
      shell: powershell

    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ matrix.artifact_name }}-${{ github.ref_name }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Update Release Body
        uses: softprops/action-gh-release@v1
        with:
          body: |
            # SKSE64 Performance Optimizations

            **Works with any modlist size - benefits scale with plugin count**

            ## Downloads

            - **Skyrim SE 1.5.97**: `skse-for-modlists-SE-1.5.97-${{ github.ref_name }}.zip`
            - **Skyrim AE 1.6.1170**: `skse-for-modlists-AE-1.6.1170-${{ github.ref_name }}.zip`

            ## What This Improves

            - **Frame time consistency** - Reduced microstutters from O(log n) lookups
            - **1% and 0.1% lows** - More consistent worst-case frame times
            - **Scalability** - O(1) operations benefit all setups; improvements scale with plugin count

            **Note:** Average FPS is unlikely to change significantly. The benefit is smoother frame times.

            ## Technical Changes

            - All `std::map` → `std::unordered_map` (O(log n) → O(1))
            - All `std::set` → `std::unordered_set` (O(log n) → O(1))
            - Cache-line alignment on frequently accessed globals
            - Larger memory pools for task delegates
            - 💾 **Memory optimizations** - Fewer allocations, better pre-sizing

            ## Installation

            1. **Download the correct version** for your Skyrim (SE or AE)
            2. **Backup your current SKSE installation**
            3. **Extract ZIP to Skyrim root folder** (where SkyrimSE.exe is located)
            4. **Overwrite files when prompted**
            5. **Launch via `skse64_loader.exe`** (or through your mod manager)

            ## Antivirus Warning

            Windows Defender may flag this as suspicious (SKSE injects DLLs). Add an exception or build from source.

            ## Compatibility

            ✅ Drop-in replacement for SKSE 2.0.20
            ✅ Same plugin API (no recompilation needed)
            ✅ Same save format (fully compatible)
            ✅ Works with all mod managers (MO2, Vortex, etc.)

            ## Technical Details

            See [PERFORMANCE_OPTIMIZATIONS.md](https://github.com/cashcon57/skse64forModlists/blob/master/PERFORMANCE_OPTIMIZATIONS.md) for complete documentation.

            ## Source Code

            All optimizations are public and reviewable. Build artifacts match the source exactly.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
